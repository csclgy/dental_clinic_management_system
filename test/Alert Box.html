<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ALERT BOX- Change Password</title>
  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background-color: #f4f9fb;
      color: #2e3a46;
      padding: 40px;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    h2 {
      color: #007c91;
      margin-bottom: 20px;
      text-align: center;
    }

    /* Form */
    form {
      background: white;
      padding: 25px;
      border-radius: 16px;
      max-width: 380px;
      width: 100%;
      box-shadow: 0 6px 18px rgba(0,0,0,0.1);
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }
    .input-group {
      position: relative;
      margin-bottom: 15px;
    }
    input {
      width: 100%;
      padding: 10px 35px 10px 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.3s;
    }
    input:focus {
      border-color: #00acc1;
    }
    .toggle-password {
      position: absolute;
      top: 50%;
      right: 10px;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 16px;
      color: #555;
    }
    .btn {
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background-color: #00acc1;
      color: white;
      font-weight: bold;
      cursor: pointer;
      font-size: 15px;
      width: 100%;
      transition: background 0.3s;
    }
    .btn:hover {
      background-color: #00838f;
    }

    /* Centered alert modal */
    .overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .alert {
      background: white;
      padding: 30px;
      border-radius: 16px;
      text-align: center;
      max-width: 350px;
      width: 90%;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      transform: scale(0.7);
      opacity: 0;
      transition: all 0.3s ease;
      position: relative;
    }
    .alert.show {
      transform: scale(1);
      opacity: 1;
    }
    .alert.success {
      border-top: 6px solid #00acc1;
    }
    .alert.error {
      border-top: 6px solid #e53935;
    }
    .alert-icon {
      font-size: 40px;
      display: block;
      margin-bottom: 10px;
    }
    .alert h3 {
      margin: 0;
      color: #007c91;
      font-size: 1.4rem;
      margin-bottom: 10px;
    }
    .alert p {
      margin: 0 0 20px;
      font-size: 1rem;
      color: #333;
    }
    .alert button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background-color: #00acc1;
      color: white;
      font-weight: bold;
      cursor: pointer;
      font-size: 14px;
    }
    .alert button:hover {
      background-color: #00838f;
    }
    .close-btn {
      position: absolute;
      top: 10px;
      right: 14px;
      background: none;
      border: none;
      font-size: 22px;
      font-weight: bold;
      color: #555;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <form id="changePasswordForm">
    <h2>🦷 Change Password</h2>
    <label for="oldPassword">Old Password</label>
    <div class="input-group">
      <input type="password" id="oldPassword" required>
      <span class="toggle-password" onclick="togglePassword('oldPassword', this)">👁</span>
    </div>

    <label for="newPassword">New Password</label>
    <div class="input-group">
      <input type="password" id="newPassword" required>
      <span class="toggle-password" onclick="togglePassword('newPassword', this)">👁</span>
    </div>

    <label for="confirmPassword">Confirm Password</label>
    <div class="input-group">
      <input type="password" id="confirmPassword" required>
      <span class="toggle-password" onclick="togglePassword('confirmPassword', this)">👁</span>
    </div>

    <button type="submit" class="btn">Change Password</button>
  </form>

  <!-- Overlay + Alert Modal -->
  <div id="overlay" class="overlay">
    <div id="alertBox" class="alert">
      <button class="close-btn" onclick="closeAlert()">×</button>
      <span id="alertIcon" class="alert-icon">ℹ️</span>
      <h3 id="alertTitle">Message</h3>
      <p id="alertMessage">Alert details go here.</p>
      <button onclick="closeAlert()">OK</button>
    </div>
  </div>

  <script>
    // Toggle show/hide password
    function togglePassword(fieldId, el) {
      const input = document.getElementById(fieldId);
      if (input.type === "password") {
        input.type = "text";
        el.textContent = "🙈"; // unsee
      } else {
        input.type = "password";
        el.textContent = "👁"; // see
      }
    }

    // Show alert modal
    function showAlert(message, type) {
      const overlay = document.getElementById("overlay");
      const alertBox = document.getElementById("alertBox");
      const alertIcon = document.getElementById("alertIcon");
      const alertTitle = document.getElementById("alertTitle");
      const alertMessage = document.getElementById("alertMessage");

      // Reset styles
      alertBox.className = "alert";
      if (type) alertBox.classList.add(type);

      // Set content
      if (type === "success") {
        alertIcon.textContent = "✔️";
        alertTitle.textContent = "Success!";
      } else if (type === "error") {
        alertIcon.textContent = "❌";
        alertTitle.textContent = "Error!";
      } else {
        alertIcon.textContent = "ℹ️";
        alertTitle.textContent = "Notice";
      }
      alertMessage.textContent = message;

      // Show modal
      overlay.style.display = "flex";
      setTimeout(() => alertBox.classList.add("show"), 50);
    }

    // Close alert modal
    function closeAlert() {
      const overlay = document.getElementById("overlay");
      const alertBox = document.getElementById("alertBox");
      alertBox.classList.remove("show");
      setTimeout(() => {
        overlay.style.display = "none";
      }, 300);
    }

    // Handle form submission
    document.getElementById("changePasswordForm").addEventListener("submit", function(e) {
      e.preventDefault();

      const newPass = document.getElementById("newPassword").value;
      const confirmPass = document.getElementById("confirmPassword").value;

      if (newPass !== confirmPass) {
        showAlert("Passwords do not match!", "error");
      } else {
        showAlert("Your password has been changed successfully.", "success");
        this.reset();
      }
    });
  </script>

</body>
</html>
